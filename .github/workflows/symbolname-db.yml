name: Build symbolname.pgd

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Build mode: sample validates the pipeline quickly; full rebuilds the complete database."
        required: true
        default: "sample"
        type: choice
        options:
          - sample
          - simulate
          - full
  schedule:
    # Monthly prebuilt symbol-name database refresh: day 18 at 02:18 UTC.
    - cron: "18 2 18 * *"

permissions:
  contents: write

concurrency:
  group: symbolname-db-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build prebuilt symbol name database
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tmp/symbolname
          MODE="${{ github.event.inputs.mode || 'full' }}"
          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            MODE="full"
          fi
          if [[ "${MODE}" == "sample" ]]; then
            DB_BRANCH="symbolname-db-sample"
            RELEASE_TAG="symbolname-db-sample-assets"
            RELEASE_NAME="symbolname-db sample assets"
            PRERELEASE_FLAG="-prerelease"
            SAMPLE_FLAG="-sample"
            SIMULATE_FLAG=""
            PART_SIZE="64"
          elif [[ "${MODE}" == "simulate" ]]; then
            DB_BRANCH="symbolname-db-simulate"
            RELEASE_TAG="symbolname-db-simulate-assets"
            RELEASE_NAME="symbolname-db simulate assets"
            PRERELEASE_FLAG="-prerelease"
            SAMPLE_FLAG=""
            SIMULATE_FLAG="-simulate-archive-size $((40 * 1024 * 1024))"
            PART_SIZE="$((4 * 1024 * 1024))"
          else
            DB_BRANCH="symbolname-db"
            RELEASE_TAG="symbolname-db-assets"
            RELEASE_NAME="symbolname-db assets"
            PRERELEASE_FLAG=""
            SAMPLE_FLAG=""
            SIMULATE_FLAG=""
            # GitHub recommends Releases for large binaries; keep each asset
            # well below the documented 2 GiB per-asset ceiling for Free/Pro.
            PART_SIZE="$((1024 * 1024 * 1024))"
          fi
          DB_DIR="symbolname"
          DB_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${DB_BRANCH}/${DB_DIR}/symbolname.pgd.zst"
          go run ./cmd/build-symbolname-db \
            -out ".tmp/${DB_DIR}/symbolname.pgd.zst" \
            -manifest ".tmp/${DB_DIR}/manifest.json" \
            -download-url "${DB_URL}" \
            -source-url "https://ftp.ncbi.nlm.nih.gov/gene/DATA/GENE_INFO/" \
            -part-size "${PART_SIZE}" \
            -download-workers "8" \
            ${SIMULATE_FLAG} \
            ${SAMPLE_FLAG}
          if compgen -G ".tmp/${DB_DIR}/symbolname.pgd.zst.part*" > /dev/null; then
            rm -f ".tmp/${DB_DIR}/symbolname.pgd.zst"
          fi
          echo "${DB_BRANCH}" > .tmp/symbolname-db-branch.txt
          echo "${RELEASE_TAG}" > .tmp/symbolname-db-release-tag.txt
          echo "${RELEASE_NAME}" > .tmp/symbolname-db-release-name.txt
          echo "${PRERELEASE_FLAG}" > .tmp/symbolname-db-prerelease-flag.txt
          echo "${DB_BRANCH}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" > .tmp/symbolname-db-asset-prefix.txt

      - name: Publish symbolname-db assets and manifest
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PUBLISH_DIR="$(mktemp -d)"
          DB_BRANCH="$(cat .tmp/symbolname-db-branch.txt)"
          RELEASE_TAG="$(cat .tmp/symbolname-db-release-tag.txt)"
          RELEASE_NAME="$(cat .tmp/symbolname-db-release-name.txt)"
          PRERELEASE_FLAG="$(cat .tmp/symbolname-db-prerelease-flag.txt)"
          ASSET_PREFIX="$(cat .tmp/symbolname-db-asset-prefix.txt)"
          cp -R .tmp/symbolname "${PUBLISH_DIR}/symbolname"
          cat > "${PUBLISH_DIR}/README.md" <<'EOF'
          # symbolname-db

          This branch stores the latest prebuilt `symbolname.pgd` manifest for phytozome GO.
          GitHub Actions rebuilds it from NCBI Gene `GENE_INFO/` split sources once per month on day 18 at 02:18 UTC, plus manual dispatch.
          Database archive files are distributed through GitHub Release assets; this branch is updated only after all referenced assets have uploaded successfully.
          EOF
          go run ./cmd/publish-symbolname-db \
            -repo "${GITHUB_REPOSITORY}" \
            -branch "${DB_BRANCH}" \
            -source "${PUBLISH_DIR}" \
            -message "Update prebuilt symbolname.pgd" \
            -release-tag "${RELEASE_TAG}" \
            -release-name "${RELEASE_NAME}" \
            -release-asset-prefix "${ASSET_PREFIX}" \
            -cleanup-old-assets-prefix "${DB_BRANCH}-" \
            ${PRERELEASE_FLAG}
